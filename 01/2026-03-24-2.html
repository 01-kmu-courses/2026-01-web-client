<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Web</title>
    <link rel="stylesheet" href="./assets/css/body.css">
</head>

<body>
    <form action="#" method="post">
        <div>
            <label for="id">아이디</label>
            <input id="id" type="text" placeholder="아이디 입력">
        </div>

        <div>
            <label for="pw">비밀번호</label>
            <input id="pw" type="password" placeholder="비밀번호 입력">
        </div>

        <div>
            <label for="email">이메일</label>
            <input id="email" type="email" placeholder="example@email.com">
        </div>

        <div>
            <label for="gender">성별</label>
            <input type="radio" name="gender" id="male">
            <input type="radio" name="gender" id="female">
        </div>

        <div>
            <label for="interest">관심사</label>
            <input type="checkbox" name="interest" id="sports">
            <input type="checkbox" name="interest" id="music">
            <input type="checkbox" name="interest" id="travle">
        </div>

        <div>
            <label for="residence">거주지</label>
            <select name="residence" id="residence">
                <optgroup label="서울">
                    <option value="" disabled>-- 선택 --</option>
                    <option value="1">종로구</option>
                    <option value="1">중랑구</option>
                    <option value="1">강동구</option>
                    <option value="1">서초구</option>
                    <option value="1">성북구</option>
                </optgroup>
                <optgroup label="경기도">
                    <option value="" disabled>-- 선택 --</option>
                </optgroup>
                <optgroup label="강원도">
                    <option value="" disabled>-- 선택 --</option>
                </optgroup>
                <optgroup label="충청북도">
                    <option value="" disabled>-- 선택 --</option>
                </optgroup>
                <optgroup label="충청남도">
                    <option value="" disabled>-- 선택 --</option>
                </optgroup>
                <optgroup label="경상북도">
                    <option value="" disabled>-- 선택 --</option>
                </optgroup>
                <optgroup label="경상남도">
                    <option value="" disabled>-- 선택 --</option>
                </optgroup>
                <optgroup label="전북도">
                    <option value="" disabled>-- 선택 --</option>
                </optgroup>
                <optgroup label="전라남도">
                    <option value="" disabled>-- 선택 --</option>
                </optgroup>
                <optgroup label="제주도">
                    <option value="" disabled>-- 선택 --</option>
                </optgroup>
            </select>
        </div>

        <div>
            <label for="intro">자기소개</label>
            <textarea name="intro" id="intro">자기소개</textarea>
        </div>
    </form>
</body>

</html>
