<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음식 취향 설문조사</title>
</head>

<body>
    <header>
        <h1>음식 취향 설문조사</h1>
        <nav>
            <a href="./index.html">&lt;&mdash; 목록으로 돌아가기</a>
        </nav>
    </header>
    <main>
        <div>
            <div>
                <form action="#" method="post">
                    <div>
                        <p><label for="name">이름</label></p>
                        <p><input type="text" id="name" placeholder="이름을 입력하세요"></p>
                    </div>
                    <div>
                        <p><label for="email">이메일</label></p>
                        <p><input type="email" id="email" placeholder="example@email.com"></p>
                    </div>
                    <div>
                        <label for="prefer">더 좋아하는 음식은?</label>
                        <p>
                            <input type="radio" name="prefer" id="pork" value="제육볶음">
                            <label for="pork">제육볶음</label>
                        </p>
                        <p>
                            <input type="radio" name="prefer" id="sushi" value="초밥">
                            <label for="sushi">초밥</label>
                        </p>
                    </div>
                    <div>
                        <label for="reason">좋아하는 이유 (복수 선택 가능)</label>
                        <p>
                            <input type="checkbox" name="reason" id="taste" value="맛" checked>
                            <label for="taste">맛</label>
                        </p>
                        <p>
                            <input type="checkbox" name="reason" id="expense" value="가격">
                            <label for="expense">가격</label>
                        </p>
                        <p>
                            <input type="checkbox" name="reason" id="air" value="분위기">
                            <label for="air">분위기</label>
                        </p>
                        <p>
                            <input type="checkbox" name="reason" id="health" value="건강">
                            <label for="health">건강</label>
                        </p>
                    </div>
                    <div>
                        <p><label for="frequency">자주 먹는 빈도</label></p>
                        <select name="frequency" id="frequency">
                            <option value="" selected disabled hidden>--선택하세요--</option>
                            <option value="1">주 1회</option>
                            <option value="2">주 2회</option>
                            <option value="3">주 3회</option>
                            <option value="4">주 4회</option>
                            <option value="5">주 5회</option>
                            <option value="6">주 6회</option>
                            <option value="7">주 7회</option>
                        </select>
                    </div>
                    <div>
                        <p><label for="user_reason">한줄 추천 이유</label></p>
                        <textarea name="user_reason" id="user_reason" placeholder="추천 이유를 입력해주세요"></textarea>
                    </div>
                    <button type="submit">제출하기</button>                    
                </form>
            </div>
        </div>
    </main>
    <footer>
    </footer>
</body>

</html>
